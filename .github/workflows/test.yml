name: Build check Docker images

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      epgstation: ${{ steps.filter.outputs.epgstation }}
      mirakurun: ${{ steps.filter.outputs.mirakurun }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            epgstation:
              - src/epgstation/**
            mirakurun:
              - src/mirakurun/**

  epgstation:
    needs:
      - changes
    if: needs.changes.outputs.epgstation == 'true'
    uses: ./.github/workflows/build-check.yml
    with:
      context: ./src/epgstation

  mirakurun:
    needs:
      - changes
    if: needs.changes.outputs.mirakurun == 'true'
    uses: ./.github/workflows/build-check.yml
    with:
      context: ./src/mirakurun
