name: Build and push EPGStation

on:
  push:
    branches:
      - main
    paths:
      - src/mirakurun/*
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-and-push.yml
    with:
      image: ghcr.io/hiroxto/mirakurun
      context: ./src/mirakurun
      platforms: linux/amd64
